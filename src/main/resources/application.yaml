server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: Y-RAG
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/yrag?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 12345678

sa-token:
  # 7 天最大存活，2 小时空闲超时
  timeout: 604800
  active-timeout: 7200

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.ysx.agent.domain
  global-config:
    db-config:
      id-type: auto
      select-strategy: not_empty
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.ysx.agent.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
